<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Betting</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
        h1 { text-align: center; }
        form { margin: 20px; }
    </style>
</head>
<body>
    <h1>Live Sports Betting</h1>

    <h2>Live Bets</h2>
    <table>
        <tr>
            <th>Event</th>
            <th>Odds</th>
            <th>Action</th>
        </tr>
        <tr>
            <td>Team A vs Team B</td>
            <td>1.8</td>
            <td><button>Bet Now</button></td>
        </tr>
        <tr>
            <td>Team C vs Team D</td>
            <td>2.1</td>
            <td><button>Bet Now</button></td>
        </tr>
    </table>

    <h2>Place Your Bet</h2>
    <form>
        <label for="event">Select Event:</label>
        <select id="event">
            <option value="team-a-vs-team-b">Team A vs Team B</option>
            <option value="team-c-vs-team-d">Team C vs Team D</option>
        </select>
        <br><br>
        <label for="amount">Bet Amount:</label>
        <input type="number" id="amount" min="1" placeholder="Enter amount">
        <br><br>
        <input type="submit" value="Place Bet">
    </form>
</body>
</html>
